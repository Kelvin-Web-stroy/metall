<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Корзина — ГераМеталл</title>
  <link rel="stylesheet" href="assets/site.css"/>
  <link rel="stylesheet" href="assets/cart.css"/>
</head>
<body>

<header>
  <div class="container">
    <div class="head">
      <a class="brand" href="index.html">
        <span class="logo" aria-hidden="true">
          <img src="assets/img/logo.png" alt="ГераМеталл">
        </span>
        <span class="name">ГераМеталл<span class="tag">корзина</span></span>
      </a>

      <a class="catalog-btn" href="catalog.html">
        <span class="burger"><i></i></span>
        Каталог
      </a>

      <div class="head-right">
        <a class="cart-link" href="cart.html" title="Корзина">
          🛒 <span class="cart-badge" data-cart-badge style="display:none">0</span>
        </a>
      </div>
    </div>
  </div>
</header>

<main class="container page">
  <h1 class="page-title">Корзина</h1>
  <p class="page-sub">Проверьте позиции и отправьте заявку.</p>

  <div class="cart-wrap">
    <section>
      <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
        <span class="pill">Товаров: <span id="cartCount">0</span></span>
        <button id="clearCart" class="btn">Очистить корзину</button>
      </div>

      <div id="cartOut"></div>
      <div id="cartCards" class="cart-cards"></div>
    </section>

    <aside class="side">
      <h3>Данные для заявки</h3>
      <div class="row">
        <div>
          <label>Имя</label>
          <input id="name" placeholder="Как к вам обращаться"/>
        </div>
        <div>
          <label>Телефон</label>
          <input id="phone" placeholder="+7 (___) ___-__-__"/>
        </div>
        <div>
          <label>Комментарий</label>
          <textarea id="comment" placeholder="Адрес доставки, резка, сроки…"></textarea>
        </div>
      </div>

      <div class="actions">
        <button id="copyRequest" class="btn">Скопировать заявку</button>
        <button id="waRequest" class="btn primary">Отправить в WhatsApp</button>
        <button id="mailRequest" class="btn">Отправить на почту</button>
      </div>
    </aside>
  </div>
</main>
